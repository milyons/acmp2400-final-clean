name: CI Pipeline

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t django-app .

      - name: Run container
        run: docker run -d -p 8000:8000 django-app

      - name: Show container logs
        run: docker ps -a && docker logs $(docker ps -alq)

      - name: Wait for server
        run: sleep 10

      - name: Test endpoint
        run: curl --retry 5 --retry-delay 3 http://localhost:8000

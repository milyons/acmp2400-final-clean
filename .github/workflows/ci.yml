name: CI Pipeline

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t django-app .

      - name: Run container
        run: docker run -d -p 8000:8000 django-app

      - name: Test endpoint
        run: curl http://localhost:8000
